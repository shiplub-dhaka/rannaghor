<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Rannaghor · রান্নাঘর</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* CONFIGURE SUPABASE BELOW */
:root{--herb:#1B6E47;--herb-d:#0F5A39;--herb-s:#E5F0EA;--saff:#E2941F;--saff-s:#FBEFD9;--tom:#D1493A;--tom-s:#FBE7E3;--paper:#FBF7F0;--ink:#1C2B23;--muted:#7C6F5C;--line:#ECE3D4;--card:#fff;--ui:'Plus Jakarta Sans',system-ui,sans-serif;--dp:'Fraunces',Georgia,serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:var(--ui);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
body{padding-bottom:76px;}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;border:none;background:none;color:inherit;}
a{color:var(--herb-d);text-decoration:none;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-thumb{background:#D0C8B8;border-radius:99px;}
img{display:block;max-width:100%;}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;}
.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));}
@media(min-width:540px){.grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr));}}
@media(min-width:900px){.grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));}}
header{position:sticky;top:0;z-index:30;background:rgba(251,247,240,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:12px;padding:12px 0;}
.logo{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,#1B6E47,#2E9A66);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.brand h1{font-family:var(--dp);font-size:21px;font-weight:700;line-height:1;}
.brand .sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.av-btn{width:34px;height:34px;border-radius:50%;background:var(--herb-s);border:1.5px solid var(--herb);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--herb-d);cursor:pointer;}
nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;padding:6px 4px max(8px,env(safe-area-inset-bottom)) 4px;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;color:#9A8C75;font-size:10.5px;font-weight:600;}
.tab.on{color:var(--herb-d);}
.tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
main{padding:14px 0;}
.view{display:none;}.view.on{display:block;}
.inp{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:#FCFAF5;font-size:14px;color:var(--ink);}
.inp:focus{border-color:var(--herb);outline:none;}
.inp.pl{padding-left:36px;}
.s-wrap{position:relative;}
.s-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:#A89A84;}
textarea.inp{resize:vertical;min-height:50px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 14px;border-radius:12px;font-weight:700;font-size:13.5px;}
.btn:active{transform:scale(.97);}
.btn-g{background:var(--herb);color:#fff;}
.btn-w{background:#fff;border:1px solid var(--line);color:#5B5142;}
.btn-b{width:100%;}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px;}
.p-g{background:var(--herb-s);color:var(--herb-d);}
.p-s{background:var(--saff-s);color:#9C6406;}
.p-t{background:var(--tom-s);color:#B23120;}
.p-i{background:#F3EEE3;color:#5B5142;}
.chips{display:flex;gap:6px;overflow-x:auto;padding:2px 0 4px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--muted);font-weight:600;font-size:13px;}
.chip.on{background:var(--herb);border-color:var(--herb);color:#fff;}
.lbl{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:#5B5142;margin-bottom:9px;}
.lbl svg{color:var(--herb);}
.av{border-radius:50%;background:var(--herb-s);color:var(--herb-d);font-weight:700;display:inline-flex;align-items:center;justify-content:center;border:1px solid #CFE3D7;flex-shrink:0;}
.rcard{position:relative;overflow:hidden;background:var(--card);border:1px solid var(--line);border-radius:18px;transition:transform .15s,box-shadow .15s;cursor:pointer;}
.rcard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08);}
.rthumb{position:relative;height:116px;overflow:hidden;background:linear-gradient(135deg,#2C7A7B,#4FB0B2);}
.rthumb img{width:100%;height:100%;object-fit:cover;}
.rthumb .em{position:absolute;left:10px;top:8px;font-size:30px;z-index:1;}
.rthumb .abadge{position:absolute;left:8px;bottom:8px;background:rgba(255,255,255,.93);border-radius:99px;padding:2px 8px;font-size:10.5px;font-weight:700;color:#3A3327;z-index:1;}
.rthumb .hbtn{position:absolute;right:8px;top:8px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.93);display:flex;align-items:center;justify-content:center;z-index:2;}
.rbody{padding:10px 12px 12px;}
.rname{font-family:var(--dp);font-size:15px;font-weight:600;line-height:1.2;margin-bottom:6px;}
.rmeta{display:flex;flex-wrap:wrap;gap:7px;font-size:11.5px;color:var(--muted);margin-bottom:8px;}
.rmeta span{display:inline-flex;align-items:center;gap:3px;}
.shimmer{background:linear-gradient(90deg,#f0ece4 25%,#e8e4dc 50%,#f0ece4 75%);background-size:200% 100%;animation:sh 1.4s infinite;border-radius:18px;height:190px;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.scrim{position:fixed;inset:0;z-index:60;background:rgba(28,43,35,.5);display:flex;align-items:flex-end;justify-content:center;animation:fi .2s;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.sheet{background:var(--paper);width:100%;max-width:680px;max-height:94vh;overflow-y:auto;border-radius:20px 20px 0 0;border-top:1px solid var(--line);animation:si .22s cubic-bezier(.32,.72,0,1);}
@keyframes si{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.s-hero{position:relative;height:190px;overflow:hidden;background:#2C7A7B;}
.s-hero img{width:100%;height:100%;object-fit:cover;}
.s-close{position:absolute;right:12px;top:12px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.93);display:flex;align-items:center;justify-content:center;z-index:2;}
.s-pad{padding:18px;}
.s-pad h2{font-family:var(--dp);font-size:23px;font-weight:700;line-height:1.1;margin-bottom:8px;}
.meta-r{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:13px;color:var(--muted);margin-bottom:14px;}
.yt-box{position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;background:#000;margin-bottom:14px;}
.yt-box iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.yt-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;}
.yt-ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.6;}
.yt-ph .play{position:relative;z-index:1;width:54px;height:54px;border-radius:50%;background:#FF0000;display:flex;align-items:center;justify-content:center;}
.yt-ph .ptitle{position:relative;z-index:1;color:#fff;font-weight:700;font-size:14px;text-align:center;padding:0 16px;}
.ing-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 13px;border-top:1px solid #F1EADC;}
.ing-item:first-child{border-top:none;}
.ichk{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step{display:flex;gap:11px;margin-bottom:10px;}
.stepn{width:24px;height:24px;border-radius:50%;background:var(--herb);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.star-row{display:flex;gap:3px;margin-bottom:8px;}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(10px);background:#1C2B23;color:#fff;padding:10px 16px;border-radius:99px;font-size:13.5px;font-weight:600;z-index:90;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;box-shadow:0 8px 24px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.day-card{padding:12px;margin-bottom:10px;}
.day-card .dn{font-weight:700;font-size:14px;margin-bottom:10px;}
.slot-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.slot-lbl{font-size:11px;font-weight:700;color:#9A8C75;text-transform:uppercase;letter-spacing:.4px;}
.plan-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:12px;background:#FAF6EE;border:1px solid #F0E9DA;margin-bottom:5px;}
.plan-th{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--herb-s);}
.banner{padding:11px 14px;border-radius:12px;font-size:13px;line-height:1.5;margin-bottom:14px;}
.ban-s{background:var(--saff-s);color:#9C6406;border:1px solid #F1DDB6;}
.ban-g{background:var(--herb-s);color:var(--herb-d);border:1px solid #BDD9C8;}
.spin{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--herb);border-radius:50%;animation:spn .7s linear infinite;margin:28px auto;}
@keyframes spn{to{transform:rotate(360deg)}}
.ptag{display:inline-flex;align-items:center;gap:5px;background:#F3EEE3;color:#5B5142;font-size:12.5px;font-weight:600;padding:4px 6px 4px 10px;border-radius:99px;}
.empty{padding:30px 20px;text-align:center;}
.empty .eic{width:48px;height:48px;border-radius:14px;background:var(--herb-s);display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;color:var(--herb);}
.empty h3{font-family:var(--dp);font-size:17px;font-weight:600;margin-bottom:5px;}
.empty p{font-size:13.5px;color:var(--muted);max-width:360px;margin:0 auto;line-height:1.5;}
.h-sect{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 14px;}
.h-sect h2{font-family:var(--dp);font-size:19px;font-weight:600;}
.fl{font-size:12px;font-weight:700;color:#7C6F5C;margin-bottom:6px;}
.eater-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;border-radius:99px;border:1px solid;font-weight:600;font-size:13px;}
.src-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;background:var(--saff-s);color:#9C6406;text-decoration:none;}
/* COOKING SITES */
.site-card{border:0.5px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px;background:var(--card);display:flex;align-items:center;gap:12px;}
.site-card.on{border-color:var(--herb);background:var(--herb-s);}
.site-logo{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.site-info{flex:1;}
.site-name{font-size:13.5px;font-weight:600;color:var(--ink);}
.site-desc{font-size:11.5px;color:var(--muted);}
.site-toggle{width:40px;height:22px;border-radius:99px;position:relative;flex-shrink:0;border:none;cursor:pointer;transition:background .15s;}
.site-toggle.on{background:var(--herb);}
.site-toggle.off{background:#D8CFBE;}
.site-toggle::after{content:'';position:absolute;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s;}
.site-toggle.on::after{left:20px;}
.site-toggle.off::after{left:2px;}
.site-filter-btn{padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:12.5px;font-weight:600;margin:3px;}
.site-filter-btn.on{background:var(--herb);border-color:var(--herb);color:#fff;}
.search-source-row{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 4px;}
.src-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:99px;border:1px solid var(--line);background:#fff;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;}
.src-chip.on{background:var(--herb);border-color:var(--herb);color:#fff;}
.kids-tag{display:inline-flex;padding:2px 7px;border-radius:99px;background:#FFF3E0;color:#E65100;font-size:10px;font-weight:700;}

/* NUTRITION */
.nut-card{border:0.5px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:12px;background:var(--card);}
.nut-ring-wrap{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
.nut-ring{position:relative;width:90px;height:90px;flex-shrink:0;}
.nut-ring svg{transform:rotate(-90deg);}
.nut-ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.nut-ring .kcal{font-family:var(--dp);font-size:16px;font-weight:700;line-height:1;}
.nut-ring .lbl{font-size:10px;color:var(--muted);}
.macro-bar{height:8px;border-radius:99px;background:#F0E9DA;overflow:hidden;margin-bottom:4px;}
.macro-fill{height:100%;border-radius:99px;}
.member-nut{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid #F1EADC;}
.member-nut:last-child{border-bottom:none;}
.nut-bar-wrap{flex:1;}
.nut-pct{font-size:12px;font-weight:700;width:50px;text-align:right;flex-shrink:0;}
.bmr-card{background:linear-gradient(135deg,var(--herb-s),#d4edda);border:1px solid #BDD9C8;border-radius:14px;padding:14px 16px;margin-bottom:12px;}
.bmr-card h3{font-family:var(--dp);font-size:16px;font-weight:600;color:var(--herb-d);margin-bottom:4px;}
.bmr-card .bmr-val{font-size:28px;font-weight:700;color:var(--herb-d);font-family:var(--dp);}
.bmr-card .bmr-sub{font-size:12px;color:var(--herb-d);opacity:.8;}
.intake-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #F1EADC;}
.intake-item:last-child{border-bottom:none;}
.intake-kcal{font-size:14px;font-weight:700;color:var(--herb-d);}
.cal-badge{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;}
.cal-ok{background:var(--herb-s);color:var(--herb-d);}
.cal-over{background:var(--tom-s);color:var(--tom-d);}
.cal-low{background:var(--saff-s);color:var(--saff-d);}
.activity-btn{padding:7px 13px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:13px;font-weight:600;margin:3px;}
.activity-btn.on{background:var(--herb);border-color:var(--herb);color:#fff;}
.goal-btn{padding:7px 13px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:13px;font-weight:600;margin:3px;}
.goal-btn.on{background:var(--saff);border-color:var(--saff);color:#fff;}
.allergy-btn{padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:12.5px;font-weight:600;margin:3px;}
.allergy-btn.on{background:var(--tom-s);border-color:var(--tom-d);color:var(--tom-d);}
.today-summary{background:linear-gradient(135deg,#1B6E47,#2E9A66);border-radius:16px;padding:16px;color:#fff;margin-bottom:14px;}
.today-summary h3{font-family:var(--dp);font-size:18px;font-weight:600;margin-bottom:10px;}
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
.macro-item{text-align:center;}
.macro-item .mv{font-size:18px;font-weight:700;line-height:1;}
.macro-item .ml{font-size:10px;opacity:.8;margin-top:2px;}

.sm-card{border:0.5px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:12px;background:var(--card);}
.sm-section{margin-bottom:18px;}
.sm-section-title{font-family:var(--dp);font-size:16px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sm-recipe{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:#FAF6EE;border:1px solid #F0E9DA;margin-bottom:8px;cursor:pointer;}
.sm-recipe:hover{background:#F3EEE3;}
.sm-recipe img{width:44px;height:44px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--herb-s);}
.sm-recipe .em{width:44px;height:44px;border-radius:9px;background:var(--herb-s);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.sm-recipe .info{flex:1;}
.sm-recipe .rn{font-size:13.5px;font-weight:600;color:#3A3327;}
.sm-recipe .rs{font-size:12px;color:var(--muted);}
.sm-step{border:0.5px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;background:var(--card);}
.sm-step .sh{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}
.stepper{display:flex;align-items:center;gap:10px;}
.stepper button{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--herb-d);}
.stepper .val{font-size:18px;font-weight:700;min-width:32px;text-align:center;}
.sm-cat-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:13px;font-weight:600;margin:4px;}
.sm-cat-btn.on{background:var(--herb);border-color:var(--herb);color:#fff;}
.shop-item2{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid #F1EADC;font-size:13.5px;}
.shop-item2:last-child{border-bottom:none;}
.gen-btn{width:100%;padding:14px;border-radius:14px;background:linear-gradient(135deg,#1B6E47,#2E9A66);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.gen-btn:active{transform:scale(.98);}
.people-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

</style>
</head>

<script>
const SB_URL='https://qdtahllshgdvqexcpazc.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkdGFobGxzaGdkdnFleGNwYXpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMjQ2NzMsImV4cCI6MjA5NzYwMDY3M30.7AR4Enc2nYVUBTqi7KJ002fJ_gmxqamsd02ATUdPeug';

<header>
  <div class="wrap">
    <div class="brand">
      <div class="logo">🍳</div>
      <div>
        <h1>Rannaghor <span style="font-size:13px;color:#9A8C75;font-weight:600;">রান্নাঘর</span></h1>

const API='https://www.themealdb.com/api/json/v1/1/';
const MC={};
let apiOk=false;

async function af(url){
  if(MC[url])return MC[url];
  try{
    const r=await fetch(url,{signal:AbortSignal.timeout(5000)});
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    MC[url]=d;apiOk=true;
    document.getElementById('apiStatus').innerHTML='';
    return d;
  }catch(e){
    if(!apiOk){
      document.getElementById('apiStatus').innerHTML='<div class="banner ban-s" style="margin-bottom:14px;">Showing '+BUILTIN.length+' built-in recipes. Connect to the internet for 4,000+ live recipes from TheMealDB.</div>';
    }
    return null;
  }
}

async function getMeals(cat){const d=await af(API+'filter.php?c='+encodeURIComponent(cat));return d?.meals||[];}
async function getMealsByArea(a){const d=await af(API+'filter.php?a='+encodeURIComponent(a));return d?.meals||[];}
async function searchMeals(q){const d=await af(API+'search.php?s='+encodeURIComponent(q));return d?.meals||[];}
async function lookupMeal(id){
  if(id.startsWith('bd')||id.startsWith('in')||id.startsWith('it')||id.startsWith('cn')||id.startsWith('th')||id.startsWith('me')||id.startsWith('co')||id.startsWith('jp')||id.startsWith('mx')||id.startsWith('br')||id.startsWith('ds')){
    return BUILTIN.find(x=>x.idMeal===id)||null;
  }
  if(MC['meal_'+id])return MC['meal_'+id];
  const d=await af(API+'lookup.php?i='+id);
  const m=d?.meals?.[0]||null;
  if(m)MC['meal_'+id]=m;
  return m;
}
async function randomMeal(){const d=await af(API+'random.php?_='+Date.now());return d?.meals?.[0]||null;}
async function getAreas(){const d=await af(API+'list.php?a=list');return d?.meals?.map(x=>x.strArea)||[];}
async function getCats(){const d=await af(API+'list.php?c=list');return d?.meals?.map(x=>x.strCategory)||[];}

function getCookTime(meal){
  if(meal.cookTime)return meal.cookTime;
  const n=(meal.strMeal||'').toLowerCase();
  if(n.includes('quick')||n.includes('toast')||n.includes('smoothie'))return 10;
  if(n.includes('soup')||n.includes('curry')||n.includes('biryani'))return 45;
  if(n.includes('pasta')||n.includes('rice')||n.includes('noodle'))return 25;
  return 30;
}
function getIngs(meal){
  const out=[];
  for(let i=1;i<=20;i++){
    const n=meal['strIngredient'+i]?.trim(),m=meal['strMeasure'+i]?.trim();
    if(n)out.push({name:n,measure:m||''});
  }
  return out;
}
function ytId(meal){const u=meal?.strYoutube||'';const m=u.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);return m?m[1]:null;}
function srcDom(meal){try{return new URL(meal?.strSource||'').hostname.replace('www.','');}catch{return null;}}
function matchOf(meal){
  const ings=getIngs(meal);let have=0;const miss=[];
  ings.forEach(({name})=>{pHas(pantry,name)?have++:miss.push(name);});
  return{have,total:ings.length,pct:ings.length?have/ings.length:0,miss};
}

/* Combine built-in + live recipes */
async function renderDefault(){
  setTitle('All recipes','');
  // STEP 1 — show built-in recipes IMMEDIATELY, no waiting
  let builtinList=BUILTIN;
  if(vegOnly)builtinList=builtinList.filter(m=>m.strCategory==='Vegetarian');
  if(kidsOnly)builtinList=builtinList.filter(m=>m.strCategory==='Kids');
  if(maxCookTime<60)builtinList=builtinList.filter(m=>getCookTime(m)<=maxCookTime);
  document.getElementById('recipeCounter').textContent=builtinList.length+'+ recipes · videos · cloud sync';
  setTitle('All recipes',builtinList.length+' recipes');
  renderCards(builtinList);

  // STEP 2 — load live recipes in background, add them when ready
  try{
    const liveCats=['Chicken','Beef','Seafood','Vegetarian','Pasta','Dessert','Breakfast','Lamb'];
    const liveResults=await Promise.all(liveCats.map(c=>getMeals(c)));
    const liveMeals=[];const seen=new Set(BUILTIN.map(b=>b.idMeal));
    liveResults.flat().forEach(m=>{if(!seen.has(m.idMeal)){seen.add(m.idMeal);liveMeals.push(m);}});
    if(liveMeals.length>0){
      const all=[...BUILTIN,...liveMeals];
      const list=vegOnly?all.filter(m=>m.strCategory==='Vegetarian'):all;
      document.getElementById('recipeCounter').textContent=list.length+'+ recipes · videos · cloud sync';
      setTitle('All recipes',list.length+' recipes');
      renderCards(list);
    }
  }catch(e){
    // live API failed — built-in recipes already showing, no problem
  }
}

async function cookHave(){setTitle('From your pantry','');showShim();
  const mains=['chicken','beef','egg','rice','potato','fish','prawn','lentil','pasta','tomato','mushroom','spinach'];
  const seeds=mains.filter(m=>pHas(pantry,m)).slice(0,3);
  const bi=BUILTIN.filter(m=>getIngs(m).some(i=>pHas(pantry,i.name)));
  if(!seeds.length&&!bi.length){toast('Add some pantry items first');renderDefault();return;}
  const sets=await Promise.all(seeds.map(s=>af(API+'filter.php?i='+encodeURIComponent(s))));
  const ids=new Set();sets.forEach(d=>(d?.meals||[]).slice(0,10).forEach(m=>ids.add(m.idMeal)));
  const full=await Promise.all([...ids].slice(0,14).map(id=>lookupMeal(id)));
  const all=[...bi,...full.filter(Boolean)];
  const seen=new Set();const unique=all.filter(m=>{if(seen.has(m.idMeal))return false;seen.add(m.idMeal);return true;});

}

function pickRecipes(cat,count){
  if(!count)return[];
  const picks=CAT_PICKS[cat]||CAT_PICKS.main;
  const filter=CAT_FILTERS[cat]||CAT_FILTERS.main;
  let pool=BUILTIN.filter(filter);
  if(pantryPref){
    pool.sort((a,b)=>matchOf(b).pct-matchOf(a).pct);
  } else {
    pool=pool.sort(()=>Math.random()-.5);
  }
  // deduplicate from already selected
  const used=new Set(smGenerated?Object.values(smGenerated).flat().map(r=>r.idMeal):[]);
  pool=pool.filter(m=>!used.has(m.idMeal));
  return pool.slice(0,count);
}

/* ═══ NUTRITION & CALORIE SYSTEM ═══ */

/* Harris-Benedict Revised Formula (Mifflin-St Jeor) — used by WHO, NHS, Mayo Clinic */
function calcBMR(member){
  const w=member.weight||70, h=member.height||170, a=member.age||30;
  if(member.gender==='female'){
    return Math.round(10*w + 6.25*h - 5*a - 161);
  }
  return Math.round(10*w + 6.25*h - 5*a + 5);
}

/* Activity multipliers (WHO standard) */
const ACTIVITY_MULT={
  sedentary:1.2,      // desk job, little exercise
  light:1.375,        // light exercise 1-3 days/week
  moderate:1.55,      // moderate exercise 3-5 days/week
  active:1.725,       // hard exercise 6-7 days/week
  veryactive:1.9      // very hard exercise, physical job
};

/* Goal adjustments */
const GOAL_ADJ={
  lose:-500,     // lose ~0.5kg/week
  maintain:0,
  gain:+300      // gain lean muscle
};

function calcTDEE(member){
  const bmr=calcBMR(member);
  const mult=ACTIVITY_MULT[member.activity||'moderate'];
  const adj=GOAL_ADJ[member.goal||'maintain'];
  return Math.round(bmr*mult)+adj;
}

/* Macronutrient targets (based on USDA/WHO guidelines) */
function calcMacros(tdee){
  return{
    protein: Math.round(tdee*0.25/4),   // 25% protein, 4kcal/g
    carbs:   Math.round(tdee*0.50/4),   // 50% carbs, 4kcal/g
    fat:     Math.round(tdee*0.25/9),   // 25% fat, 9kcal/g
  };
}

/* ── PATCH SET MENU TO SHOW CALORIE ANALYSIS PER MEMBER ── */
const _origRenderSetMenuResult=window.renderSetMenuResult;
function renderSetMenuResultWithCalories(){
  // call original
  if(typeof renderSetMenuResult_orig==='function') renderSetMenuResult_orig();

  if(!smGenerated)return;
  const allRecipes=Object.values(smGenerated).flat();
  const totalKcal=allRecipes.reduce((s,m)=>s+getRecipeKcal(m.idMeal),0);
  const totalP=allRecipes.reduce((s,m)=>s+(getRecipeMacros(m.idMeal).p||0),0);
  const totalC=allRecipes.reduce((s,m)=>s+(getRecipeMacros(m.idMeal).c||0),0);
  const totalF=allRecipes.reduce((s,m)=>s+(getRecipeMacros(m.idMeal).f||0),0);

  const smEl=document.getElementById('smResult');
  if(!smEl)return;

  // Append calorie analysis
  const calDiv=document.createElement('div');
  calDiv.className='nut-card';
  calDiv.style.marginTop='12px';
  calDiv.innerHTML=`
    <div class="lbl">${ic('flame',15)} Calorie analysis for this menu</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;text-align:center;">
      <div style="background:var(--herb-s);border-radius:10px;padding:10px;">
        <div style="font-family:var(--dp);font-size:20px;font-weight:700;color:var(--herb-d);">${totalKcal}</div>
        <div style="font-size:10px;color:var(--herb-d);">Total kcal</div>
      </div>
      <div style="background:#FBE7E3;border-radius:10px;padding:10px;">
        <div style="font-family:var(--dp);font-size:20px;font-weight:700;color:#B23120;">${totalP}g</div>
        <div style="font-size:10px;color:#B23120;">Protein</div>
      </div>
      <div style="background:var(--saff-s);border-radius:10px;padding:10px;">
        <div style="font-family:var(--dp);font-size:20px;font-weight:700;color:var(--saff-d);">${totalC}g</div>
        <div style="font-size:10px;color:var(--saff-d);">Carbs</div>
      </div>
      <div style="background:#E6F1FB;border-radius:10px;padding:10px;">
        <div style="font-family:var(--dp);font-size:20px;font-weight:700;color:#185FA5;">${totalF}g</div>
        <div style="font-size:10px;color:#185FA5;">Fat</div>
      </div>
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;">Per family member — how this menu covers their daily target:</div>
    ${members.filter(m=>smMemberIds.includes(m.id)).map(m=>{
      const tdee=m.target||calcTDEE(m);
      const pct=Math.min(150,Math.round(totalKcal/tdee*100));
      const col=pct>110?'#D1493A':pct>=60?'#1B6E47':'#E2941F';
      const badge=pct>110?'Over target':pct>=60?'Good coverage':'Needs more';
      const remaining=Math.max(0,tdee-totalKcal);
      return`<div class="member-nut">
        ${avH(m.name,26)}
        <div class="nut-bar-wrap">
          <div style="font-size:13px;font-weight:600;margin-bottom:4px;">${esc(m.name)} <span style="font-size:11px;color:var(--muted);">${tdee} kcal target</span></div>
          <div class="macro-bar"><div class="macro-fill" style="width:${pct}%;background:${col};"></div></div>
          <div style="font-size:11.5px;color:var(--muted);">${totalKcal} kcal · ${remaining>0?remaining+' more needed':'Target met ✓'}</div>
        </div>
        <span class="cal-badge ${pct>110?'cal-over':pct>=60?'cal-ok':'cal-low'}">${pct}%</span>
      </div>`;
    }).join('')}
  `;
  smEl.appendChild(calDiv);
}

  if(activeSites.has(id)){
    activeSites.delete(id);

  }

function toggleSiteSearch(id){
  if(activeSearchSites.has(id)){
    if(activeSearchSites.size<=1){toast('Keep at least one search site active');return;}
    activeSearchSites.delete(id);
  } else {

function addCustomSite(){
  const name=document.getElementById('customSiteName')?.value.trim();
  const url=document.getElementById('customSiteUrl')?.value.trim();
  const desc=document.getElementById('customSiteDesc')?.value.trim()||'Custom recipe site';
  const emoji=document.getElementById('customSiteEmoji')?.value.trim()||'🍲';
  if(!name||!url){toast('Enter site name and URL');return;}
  const id='custom_'+Date.now();
  COOKING_SITES.push({id,name,emoji,url,desc,api:'custom',enabled:true,kids:false,custom:true});
  activeSites.add(id);
  saveSitePrefs();
  document.getElementById('customSiteName').value='';
  document.getElementById('customSiteUrl').value='';
  document.getElementById('customSiteDesc').value='';
  document.getElementById('customSiteEmoji').value='';
  renderSitesList();renderSrcChips();
  toast('Added: '+name);
}

/* ── MULTI-SITE SEARCH — fetches from all active search sites ── */
async function multiSiteSearch(q){
  const results=[];
  const seen=new Set();

  // Always search built-in first
  const builtinMatches=BUILTIN.filter(m=>
    m.strMeal.toLowerCase().includes(q.toLowerCase())||
    (m.strArea||'').toLowerCase().includes(q.toLowerCase())||
    (m.strCategory||'').toLowerCase().includes(q.toLowerCase())
  );
  builtinMatches.forEach(m=>{if(!seen.has(m.idMeal)){seen.add(m.idMeal);results.push(m);}});

  // Search from each active site
  const promises=[];
  if(activeSearchSites.has('themealdb')){
    promises.push(searchMeals(q).then(meals=>{
      meals.forEach(m=>{if(!seen.has(m.idMeal)){seen.add(m.idMeal);results.push(m);}});
    }).catch(()=>{}));
  }

  // For other sites — open in new tab with search
  const otherActive=COOKING_SITES.filter(s=>
    activeSearchSites.has(s.id)&&s.id!=='themealdb'&&activeSites.has(s.id)
  );

  await Promise.all(promises);

  // Show results + site links for other active sites
  return{results, otherSites:otherActive};
}

/* ── KIDS SEARCH — uses TheMealDB kids-friendly categories + built-in ── */
async function searchKidsOnline(q){
  const results=[...BUILTIN.filter(m=>m.strCategory==='Kids')];
  const seen=new Set(results.map(m=>m.idMeal));

  // Search TheMealDB for kid-friendly terms
  const kidTerms=q?[q]:['chicken','pasta','egg','pancake','sandwich','soup','rice'];
  const liveSearches=await Promise.all(kidTerms.slice(0,3).map(t=>searchMeals(t).catch(()=>[])));

  // Filter for kid-friendly categories
  const kidCats=new Set(['Breakfast','Pasta','Side','Miscellaneous','Vegetarian','Chicken']);
  liveSearches.flat().forEach(m=>{
    if(!seen.has(m.idMeal)&&(kidCats.has(m.strCategory)||!m.strCategory)){
      seen.add(m.idMeal);results.push(m);
    }
  });
  return results;
}
