<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Rannaghor · রান্নাঘর</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ── TOKENS ── */
:root{
  --paper:#FBF7F0;--ink:#1C2B23;--muted:#7C6F5C;--line:#ECE3D4;--card:#fff;
  --herb:#1B6E47;--herb-d:#0F5A39;--herb-soft:#E5F0EA;
  --saff:#E2941F;--saff-d:#9C6406;--saff-soft:#FBEFD9;
  --tom:#D1493A;--tom-d:#B23120;--tom-soft:#FBE7E3;
  --ui:'Plus Jakarta Sans',system-ui,sans-serif;
  --dp:'Fraunces',Georgia,serif;
  --r12:12px;--r16:16px;--r18:18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:var(--ui);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
body{padding-bottom:76px;}
button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;border:none;background:none;color:inherit;}
a{color:var(--herb-d);text-decoration:none;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#D0C8B8;border-radius:99px;}
:focus-visible{outline:2px solid var(--herb);outline-offset:2px;border-radius:6px;}
img{display:block;}

/* ── LAYOUT ── */
.wrap{max-width:1080px;margin:0 auto;padding:0 16px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r18);}
.grid-cards{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));}
@media(min-width:560px){.grid-cards{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));}}

/* ── TYPOGRAPHY ── */
.dp{font-family:var(--dp);}
.muted{color:var(--muted);}
.h-sect{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 14px;}
.h-sect h2{font-family:var(--dp);font-size:20px;font-weight:600;}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:30;background:rgba(251,247,240,.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:12px;padding:13px 0;}
.logo{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,#1B6E47,#2E9A66);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.brand-text h1{font-family:var(--dp);font-size:22px;font-weight:700;line-height:1;}
.brand-text .sub{font-size:12px;color:var(--muted);margin-top:2px;}
.brand-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.user-av{width:34px;height:34px;border-radius:50%;background:var(--herb-soft);border:1.5px solid var(--herb);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--herb-d);cursor:pointer;}

/* ── NAV TABS ── */
nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;padding:6px 4px max(8px,env(safe-area-inset-bottom)) 4px;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;border-radius:10px;color:#9A8C75;font-size:11px;font-weight:600;transition:color .15s;}
.tab.on{color:var(--herb-d);}
.tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── VIEWS ── */
main{padding:16px 0;}
.view{display:none;}
.view.on{display:block;}

/* ── INPUTS ── */
.inp{width:100%;padding:10px 12px;border-radius:var(--r12);border:1px solid var(--line);background:#FCFAF5;font-size:14px;color:var(--ink);transition:border-color .15s;}
.inp:focus{border-color:var(--herb);outline:none;}
.inp.pl{padding-left:36px;}
.s-wrap{position:relative;}
.s-wrap .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:#A89A84;}
textarea.inp{resize:vertical;min-height:52px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 15px;border-radius:var(--r12);font-weight:700;font-size:14px;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn-g{background:var(--herb);color:#fff;}
.btn-w{background:#fff;border:1px solid var(--line);color:#5B5142;}
.btn-r{background:var(--tom-soft);border:1px solid #F0CDC6;color:var(--tom-d);}
.btn-b{width:100%;}
.btn:disabled{opacity:.5;cursor:default;}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px;}
.p-g{background:var(--herb-soft);color:var(--herb-d);}
.p-s{background:var(--saff-soft);color:var(--saff-d);}
.p-t{background:var(--tom-soft);color:var(--tom-d);}
.p-i{background:#F3EEE3;color:#5B5142;}

/* ── CHIP ROWS ── */
.chips{display:flex;gap:6px;overflow-x:auto;padding:2px 0 4px;-ms-overflow-style:none;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;padding:6px 12px;border-radius:99px;border:1px solid var(--line);background:#fff;color:var(--muted);font-weight:600;font-size:13px;transition:all .12s;}
.chip.on{background:var(--herb);border-color:var(--herb);color:#fff;}

/* ── LABEL ── */
.lbl{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:#5B5142;margin-bottom:9px;letter-spacing:.2px;}
.lbl svg{color:var(--herb);flex-shrink:0;}

/* ── AVATAR ── */
.av{border-radius:50%;background:var(--herb-soft);color:var(--herb-d);font-weight:700;display:inline-flex;align-items:center;justify-content:center;border:1px solid #CFE3D7;flex-shrink:0;}

/* ── RECIPE CARD ── */
.rcard{position:relative;overflow:hidden;background:var(--card);border:1px solid var(--line);border-radius:var(--r18);transition:box-shadow .15s,transform .15s;}
.rcard:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-2px);}
.rcard-thumb{position:relative;height:116px;overflow:hidden;}
.rcard-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.rcard:hover .rcard-thumb img{transform:scale(1.05);}
.rcard-thumb .over{position:absolute;inset:0;display:flex;align-items:flex-end;padding:8px;background:linear-gradient(to top,rgba(0,0,0,.35) 0%,transparent 55%);}
.rcard-thumb .emoji{position:absolute;left:10px;top:8px;font-size:32px;line-height:1;}
.rcard-thumb .area-badge{position:absolute;right:8px;top:8px;background:rgba(255,255,255,.93);border-radius:99px;padding:2px 8px;font-size:10.5px;font-weight:700;color:#3A3327;}
.rcard-body{padding:11px 12px 13px;}
.rcard-name{font-family:var(--dp);font-size:15.5px;font-weight:600;line-height:1.15;margin-bottom:7px;}
.rcard-meta{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--muted);margin-bottom:9px;flex-wrap:wrap;}
.rcard-meta span{display:inline-flex;align-items:center;gap:3px;}
.rcard-heart{position:absolute;right:8px;top:80px;z-index:2;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.93);display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.rcard-heart:active{transform:scale(.88);}

/* ── RING ── */
.ring-wrap{position:absolute;right:7px;bottom:7px;}

/* ── MATCH BAR ── */
.mbar{height:6px;border-radius:99px;background:#F0E9DA;overflow:hidden;}
.mbar-fill{height:100%;border-radius:99px;transition:width .3s;}

/* ── MODAL / SHEET ── */
.scrim{position:fixed;inset:0;z-index:60;background:rgba(28,43,35,.5);display:flex;align-items:flex-end;justify-content:center;animation:fadein .2s;}
@keyframes fadein{from{opacity:0;}to{opacity:1;}}
.sheet{background:var(--paper);width:100%;max-width:640px;max-height:93vh;overflow-y:auto;border-radius:20px 20px 0 0;border-top:1px solid var(--line);animation:slidein .22s cubic-bezier(.32,.72,0,1);}
@keyframes slidein{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.sheet-hero{position:relative;height:160px;overflow:hidden;}
.sheet-hero img{width:100%;height:100%;object-fit:cover;}
.sheet-hero .emoji-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:70px;}
.sheet-close{position:absolute;right:12px;top:12px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.93);display:flex;align-items:center;justify-content:center;}
.sheet-yt{position:absolute;right:12px;bottom:12px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.93);border-radius:99px;padding:7px 13px;font-weight:700;font-size:13px;color:#3A3327;}
.sheet-pad{padding:18px;}
.sheet h2{font-family:var(--dp);font-size:24px;font-weight:700;line-height:1.1;margin-bottom:8px;}
.sheet .meta-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:13px;color:var(--muted);margin-bottom:12px;}

/* ── INGREDIENT LIST ── */
.ing-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 13px;border-top:1px solid #F1EADC;}
.ing-item:first-child{border-top:none;}
.ing-chk{width:18px;height:18px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ing-have{background:var(--herb-soft);}
.ing-miss{background:var(--tom-soft);}

/* ── STEPS ── */
.step{display:flex;gap:11px;margin-bottom:10px;}
.stepn{width:24px;height:24px;border-radius:50%;background:var(--herb);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}

/* ── STAR RATING ── */
.stars{display:inline-flex;gap:2px;}
.stars svg{width:13px;height:13px;}

/* ── PLANNER ── */
.day-card{padding:12px;margin-bottom:10px;}
.day-card .dn{font-weight:700;font-size:14px;margin-bottom:10px;color:#3A3327;}
.slot-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.slot-label{font-size:11.5px;font-weight:700;color:#9A8C75;text-transform:uppercase;letter-spacing:.4px;}
.plan-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:12px;background:#FAF6EE;border:1px solid #F0E9DA;margin-bottom:5px;}
.plan-thumb{width:36px;height:36px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--herb-soft);}
.plan-emoji{width:36px;height:36px;border-radius:9px;background:var(--herb-soft);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}

/* ── AUTH ── */
.auth-wrap{max-width:400px;margin:40px auto;padding:0 16px;}
.auth-card{padding:28px;}
.auth-card h2{font-family:var(--dp);font-size:22px;font-weight:700;margin-bottom:6px;}
.auth-card .sub{font-size:13.5px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.auth-divider{text-align:center;font-size:12px;color:var(--muted);margin:14px 0;position:relative;}
.auth-divider::before{content:'';position:absolute;left:0;top:50%;width:calc(50% - 20px);height:1px;background:var(--line);}
.auth-divider::after{content:'';position:absolute;right:0;top:50%;width:calc(50% - 20px);height:1px;background:var(--line);}

/* ── SPINNER ── */
.spin{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--herb);border-radius:50%;animation:spn .7s linear infinite;margin:24px auto;}
@keyframes spn{to{transform:rotate(360deg);}}
.spin-page{padding:60px 0;text-align:center;}

/* ── SHOP LIST ── */
.shop-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #F1EADC;}
.shop-item:first-child{border-top:none;}

/* ── NUTRITION ── */
.nut-bar-wrap{display:flex;align-items:center;gap:10px;}
.nut-bar{flex:1;height:7px;border-radius:99px;background:#F0E9DA;overflow:hidden;}
.nut-bar-fill{height:100%;border-radius:99px;}

/* ── TOAST ── */
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(10px);background:#1C2B23;color:#fff;padding:10px 16px;border-radius:99px;font-size:13.5px;font-weight:600;z-index:90;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;box-shadow:0 8px 24px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── EATER BUTTONS ── */
.eater-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 10px 5px 6px;border-radius:99px;border:1px solid;font-weight:600;font-size:13px;}

/* ── TOGGLE SWITCH ── */
.toggle{width:40px;height:22px;border-radius:99px;position:relative;flex-shrink:0;transition:background .15s;cursor:pointer;border:none;}
.toggle::after{content:'';position:absolute;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s;}
.toggle.on{background:var(--herb);}
.toggle.on::after{left:20px;}
.toggle.off{background:#D8CFBE;}
.toggle.off::after{left:2px;}

/* ── PANTRY TAGS ── */
.pantry-tag{display:inline-flex;align-items:center;gap:5px;background:#F3EEE3;color:#5B5142;font-size:12.5px;font-weight:600;padding:4px 6px 4px 10px;border-radius:99px;}
.pantry-tag button{display:flex;color:#B6A98F;line-height:1;}

/* ── EMPTY STATE ── */
.empty{padding:30px 20px;text-align:center;}
.empty .eic{width:48px;height:48px;border-radius:14px;background:var(--herb-soft);display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;color:var(--herb);}
.empty h3{font-family:var(--dp);font-size:17px;font-weight:600;margin-bottom:5px;}
.empty p{font-size:13.5px;color:var(--muted);max-width:360px;margin:0 auto;line-height:1.5;}

/* ── MEMBER CARD ── */
.member-card{padding:14px;}
.member-card .mc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.member-card .mc-name{font-family:var(--dp);font-size:17px;font-weight:600;}
.member-card .mc-sub{font-size:12.5px;color:var(--muted);}

/* ── BANNER ── */
.banner{padding:11px 14px;border-radius:12px;font-size:13px;line-height:1.5;margin-bottom:14px;}
.banner-s{background:var(--saff-soft);color:var(--saff-d);border:1px solid #F1DDB6;}
.banner-g{background:var(--herb-soft);color:var(--herb-d);border:1px solid #BDD9C8;}

/* ── REVIEW ── */
.review-card{padding:12px;margin-bottom:10px;}
.review-card .rc-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}

/* ── FIELD GROUP ── */
.field-grid{display:grid;gap:10px;}
.field-grid.cols3{grid-template-columns:1fr 1fr 1fr;}
.field-lbl{font-size:12px;font-weight:700;color:#7C6F5C;margin-bottom:6px;}

/* ── ACTION SHEET ── */
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0;}

/* ── NUTRITION MACROS ── */
.macro-grid{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:12px;}
.macro{text-align:left;}
.macro .val{font-family:var(--dp);font-weight:700;line-height:1;}
.macro .lab{font-size:11px;color:#9A8C75;margin-top:3px;}

/* ── TAG SOURCES ── */
.source-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;background:var(--saff-soft);color:var(--saff-d);text-decoration:none;}
.source-badge:hover{opacity:.8;}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="wrap">
    <div class="brand">
      <div class="logo">🍳</div>
      <div class="brand-text">
        <h1>Rannaghor <span style="font-size:14px;color:#9A8C75;font-weight:600;">রান্নাঘর</span></h1>
        <div class="sub">Cook what you have · plan what you'll eat.</div>
      </div>
      <div class="brand-right">
        <div id="userAv" class="user-av" style="display:none;"></div>
        <button id="authBtn" class="btn btn-g" style="padding:8px 13px;font-size:13px;display:none;"></button>
      </div>
    </div>
  </div>
</header>

<!-- ── VIEWS ── -->
<main class="wrap">

  <!-- DISCOVER -->
  <section class="view on" id="v-discover">
    <div class="card" style="padding:14px;margin-bottom:14px;">
      <div class="s-wrap" style="margin-bottom:10px;">
        <span class="ico" id="searchIco"></span>
        <input id="searchQ" class="inp pl" placeholder="Search 35+ recipes — biryani, pasta, shakshuka…" autocomplete="off"/>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-g" id="cookHaveBtn"></button>
        <button class="btn btn-w" id="surpriseBtn"></button>
        <button class="btn btn-w" id="vegToggle"></button>
      </div>
    </div>

    <div class="card" style="padding:14px;margin-bottom:14px;">
      <div style="margin-bottom:12px;">
        <div class="lbl" id="eatersLbl"></div>
        <div id="eatersRow" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
      </div>
      <div style="margin-bottom:12px;">
        <div class="lbl" id="cuisineLbl"></div>
        <div class="chips" id="cuisineChips"></div>
      </div>
      <div style="margin-bottom:12px;">
        <div class="lbl" id="mealLbl"></div>
        <div class="chips" id="mealChips"></div>
      </div>
      <div>
        <div class="lbl" id="timeLbl"></div>
        <div class="chips" id="timeChips"></div>
      </div>
    </div>

    <div class="h-sect">
      <h2 id="resultsH"></h2>
      <span class="muted" id="readyCount" style="font-size:12.5px;"></span>
    </div>
    <div id="resultsGrid"></div>
  </section>

  <!-- PLANNER -->
  <section class="view" id="v-planner">
    <div class="h-sect"><h2>This week</h2><span class="muted" id="planCount" style="font-size:12.5px;"></span></div>
    <div id="planEmpty"></div>
    <div id="planGrid"></div>
    <h2 class="dp" style="font-size:20px;font-weight:600;margin:18px 2px 14px;">Shopping list</h2>
    <div class="card" style="padding:14px;" id="shopBox"></div>
  </section>

  <!-- PANTRY -->
  <section class="view" id="v-pantry">
    <h2 class="dp" style="font-size:20px;font-weight:600;margin-bottom:4px;">Your pantry</h2>
    <p class="muted" style="font-size:13px;margin-bottom:14px;">Keep this updated and recipes auto-match what you can cook right now.</p>
    <div id="pantrySync" class="banner banner-s" style="display:none;"></div>
    <div class="card" style="padding:14px;margin-bottom:14px;">
      <div style="display:flex;gap:8px;">
        <input id="pantryInp" class="inp" placeholder="Add an ingredient (e.g. chicken, garlic, rice)…" autocomplete="off" style="flex:1;"/>
        <button class="btn btn-g" id="pantryAddBtn" style="padding:0 16px;flex-shrink:0;"></button>
      </div>
    </div>
    <div id="pantryTags" style="display:flex;flex-wrap:wrap;gap:7px;"></div>
  </section>

  <!-- SAVED -->
  <section class="view" id="v-saved">
    <div class="h-sect"><h2>Saved recipes</h2><span class="muted" id="savedCount" style="font-size:12.5px;"></span></div>
    <div id="savedEmpty"></div>
    <div id="savedGrid" class="grid-cards"></div>
  </section>

  <!-- HOUSEHOLD -->
  <section class="view" id="v-household">
    <div class="h-sect">
      <h2>Household</h2>
      <button class="btn btn-g" id="addMemberBtn" style="padding:8px 13px;font-size:13px;"></button>
    </div>
    <p class="muted" id="hhSub" style="font-size:13px;margin-bottom:14px;"></p>
    <div class="grid-cards" id="memberGrid"></div>
  </section>

  <!-- ACCOUNT -->
  <section class="view" id="v-account">
    <div class="card" style="padding:22px;max-width:460px;margin:0 auto;" id="accountCard"></div>
  </section>

</main>

<!-- ── TABBAR ── -->
<nav class="tabs" id="tabbar"></nav>

<!-- ── MODAL ROOT ── -->
<div id="modalRoot"></div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════════════
   CONFIGURATION  — edit these two lines with your own
   Supabase project URL and anon key
   ════════════════════════════════════════════════════ */
const SB_URL = 'YOUR_SUPABASE_URL';
const SB_KEY = 'YOUR_SUPABASE_ANON_KEY';

/* ── Supabase client ── */
const sb = (SB_URL !== 'YOUR_SUPABASE_URL')
  ? supabase.createClient(SB_URL, SB_KEY)

function ringHTML(pct,sz=42){
  const r=(sz-8)/2,c=2*Math.PI*r,off=c*(1-pct);
  const col=pct>=.999?'#1B6E47':pct>=.5?'#E2941F':'#D1493A';
  return `<div class="ring-wrap"><div style="position:relative;width:${sz}px;height:${sz}px;">
    <svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
      <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#ECE3D4" stroke-width="4"/>
      <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">${Math.round(pct*100)}%</div>
  </div></div>`;
}

function avHTML(name,sz=24){
  const init=(name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return `<span class="av" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.42)}px;">${init}</span>`;
}

/* ════════ HELPERS ════════ */
const bW=s=>s.toLowerCase().trim().replace(/e?s$/,'');
const nmatch=(a,b)=>{const x=a.toLowerCase().trim(),y=b.toLowerCase().trim();return x.includes(y)||y.includes(x)||bW(x)===bW(y);};
const pHas=(p,n)=>p.some(x=>nmatch(x,n));
function matchOf(r,pantry){
  let have=0;const miss=[];
  r.ings.forEach(i=>{pHas(pantry,i.n)?have++:miss.push(i);});
  return{have,total:r.ings.length,pct:r.ings.length?have/r.ings.length:0,miss};
}
function suitFor(r,m){
  const rr=[];
  m.restrictions.forEach(res=>{
    if(res==='Vegetarian'&&r.diet==='nonveg')rr.push('not vegetarian');
    r.al.forEach(a=>{if(AL_MAP[a]===res)rr.push('contains '+a);});
  });
  return{ok:rr.length===0,reasons:[...new Set(rr)]};
}

/* ════════ SUPABASE SYNC ════════ */
async function sbSync(){
  if(!sb||!user)return;
  try{
    // push pantry
    await sb.from('pantry').upsert({user_id:user.id,items:pantry},{onConflict:'user_id'});
    // push plan
    await sb.from('plans').upsert({user_id:user.id,data:plan},{onConflict:'user_id'});
    // push saved
    await sb.from('saved_recipes').upsert({user_id:user.id,ids:[...saved]},{onConflict:'user_id'});
    // push members
    await sb.from('household').upsert({user_id:user.id,data:members},{onConflict:'user_id'});
  }catch(e){console.warn('Sync error',e);}
}
async function sbLoad(){
  if(!sb||!user)return;
  try{
    const[{data:pd},{data:pl},{data:sv},{data:hh},{data:rv}]=await Promise.all([
      sb.from('pantry').select('items').eq('user_id',user.id).single(),
      sb.from('plans').select('data').eq('user_id',user.id).single(),
      sb.from('saved_recipes').select('ids').eq('user_id',user.id).single(),
      sb.from('household').select('data').eq('user_id',user.id).single(),
      sb.from('reviews').select('recipe_id,user_name,stars,text,created_at').eq('user_id',user.id),
    ]);
    if(pd)pantry=pd.items||pantry;
    if(pl)plan=pl.data||plan;
    if(sv)saved=new Set(sv.ids||[]);
    if(hh)members=hh.data||members;
    if(rv)rv.forEach(r=>{reviews[r.recipe_id]=reviews[r.recipe_id]||[];reviews[r.recipe_id].unshift({user:r.user_name,stars:r.stars,text:r.text});});
    lsSave();
  }catch(e){console.warn('Load error',e);}
}

}

    eaters=eaters.includes(id)?eaters.filter(x=>x!==id):[...eaters,id];
    renderFilter();renderResults();
  });
  // cuisine chips
  document.getElementById('cuisineChips').innerHTML=
    [['all','All'],...CUISINES.map(c=>[c,c])].map(([v,l])=>
      `<button class="chip ${cuisine===v?'on':''}" data-cuis="${v}">${l}</button>`).join('');
  document.querySelectorAll('[data-cuis]').forEach(b=>b.onclick=()=>{cuisine=b.dataset.cuis;renderFilter();renderResults();});
  // meal chips
  document.getElementById('mealChips').innerHTML=
    [['all','Any meal'],['breakfast','Breakfast'],['lunch','Lunch'],['dinner','Dinner']].map(([v,l])=>
      `<button class="chip ${meal===v?'on':''}" data-meal="${v}">${l}</button>`).join('');
  document.querySelectorAll('[data-meal]').forEach(b=>b.onclick=()=>{meal=b.dataset.meal;renderFilter();renderResults();});
  // time chips
  document.getElementById('timeChips').innerHTML=
    [...TIMES.map(t=>[String(t),t<60?t+' min':'Any']),].map(([v,l])=>
      `<button class="chip ${maxTime===Number(v)?'on':''}" data-time="${v}">${l}</button>`).join('');
  document.querySelectorAll('[data-time]').forEach(b=>b.onclick=()=>{maxTime=Number(b.dataset.time);renderFilter();renderResults();});
  // toggle buttons
  const hb=document.getElementById('cookHaveBtn');
  hb.style.background=haveOnly?'#0F5A39':haveOnly?'#1B6E47':'#1B6E47';
  hb.style.opacity=haveOnly?'1':'1';
  hb.style.outline=haveOnly?'2px solid #0F5A39':'';
  const vb=document.getElementById('vegToggle');
  vb.style.borderColor=vegOnly?'#1B6E47':'#ECE3D4';
  vb.style.background=vegOnly?'#E5F0EA':'#fff';
  vb.style.color=vegOnly?'#0F5A39':'#5B5142';
}
function renderResults(){
  const selectedM=members.filter(m=>eaters.includes(m.id));
  const q=query.trim().toLowerCase();
  let hiddenDiet=0;
  let list=RECIPES.map(r=>({r,m:matchOf(r,pantry)})).filter(({r,m})=>{
    if(q&&!(r.name.toLowerCase().includes(q)||r.cuisine.toLowerCase().includes(q)||r.ings.some(i=>i.n.includes(q))))return false;
    if(cuisine!=='all'&&r.cuisine!==cuisine)return false;
    if(meal!=='all'&&!r.meals.includes(meal))return false;
    if(r.time>maxTime)return false;
    if(vegOnly&&r.diet!=='veg')return false;
    if(haveOnly&&m.pct<.999)return false;
    if(selectedM.some(mem=>!suitFor(r,mem).ok)){hiddenDiet++;return false;}
    return true;
  });
  list.sort((a,b)=>b.m.pct-a.m.pct||b.r.rating-a.r.rating);
  const readyN=RECIPES.filter(r=>matchOf(r,pantry).pct>=.999).length;
  document.getElementById('resultsH').textContent=`${list.length} ${list.length===1?'recipe':'recipes'}`;
  document.getElementById('readyCount').innerHTML=ic('flame',13)+` ${readyN} ready with your pantry`;
  const grid=document.getElementById('resultsGrid');
  if(!list.length){grid.innerHTML=`<div class="card empty"><div class="eic">${ic('search',22)}</div><h3>No matches</h3><p>Try a different search, cuisine, or longer cooking time.</p></div>`;return;}
  grid.innerHTML=`${hiddenDiet?`<div style="font-size:12.5px;color:#9C6406;margin-bottom:10px;">${hiddenDiet} hidden by selected members' dietary restrictions.</div>`:''}
  <div class="grid-cards">${list.map(({r,m})=>rcardHTML(r,m)).join('')}</div>`;
  grid.querySelectorAll('[data-open]').forEach(b=>b.onclick=e=>{if(!e.target.closest('[data-save]'))openRecipe(b.dataset.open);});
  grid.querySelectorAll('[data-save]').forEach(b=>b.onclick=e=>{e.stopPropagation();toggleSave(b.dataset.save);renderResults();});
}

/* ════════ SAVE ════════ */
function toggleSave(id){
  if(saved.has(id)){saved.delete(id);showToast('Removed from saved');}
  else{saved.add(id);showToast('Saved!');}
  lsSave();if(sb&&user)sbSync();
}

/* ════════ SHARE ════════ */
async function doShare(r){
  const url=ytLink(r.name);const text=r.name+' — '+r.cuisine+' recipe';
  try{if(navigator.share){await navigator.share({title:r.name,text,url});return;}}catch(e){if(e&&e.name==='AbortError')return;}
  // fallback picker
  const wa='https://wa.me/?text='+encodeURIComponent(text+'\n'+url);
  const mail='mailto:?subject='+encodeURIComponent('Recipe: '+r.name)+'&body='+encodeURIComponent(text+'\n\nVideo: '+url);
  const n=document.createElement('div');n.className='scrim';n.style.zIndex=70;
  n.innerHTML=`<div class="sheet" style="max-width:400px;"><div class="sheet-pad">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;"><h2 style="font-size:19px;">Share recipe</h2><button id="shCloseShare" class="sheet-close" style="position:relative;right:auto;top:auto;">${ic('x',17)}</button></div>
    <p class="muted" style="font-size:13.5px;margin-bottom:14px;">${esc(r.name)}</p>
    <div style="display:grid;gap:8px;">
      <a class="btn btn-g btn-b" href="${wa}" target="_blank" rel="noopener" style="background:#25D366;text-decoration:none;">${ic('share',15)} WhatsApp</a>
      <a class="btn btn-w btn-b" href="${mail}" style="text-decoration:none;">${ic('msg',15)} Email</a>
      <button class="btn btn-w btn-b" id="copyLinkBtn">${ic('share',15)} Copy link</button>
    </div>
  </div></div>`;
  document.body.appendChild(n);
  n.onclick=e=>{if(e.target===n)n.remove();};
  n.querySelector('#shCloseShare').onclick=()=>n.remove();
  n.querySelector('#copyLinkBtn').onclick=async()=>{
    try{await navigator.clipboard.writeText(text+'\n'+url);showToast('Copied!');}catch(e){showToast('Could not copy');}
    n.remove();
  };
}

            <button data-open="${en.id}" style="flex:1;text-align:left;"><div style="font-size:13.5px;font-weight:600;color:#3A3327;">${esc(r.name)}</div><div class="muted" style="font-size:11.5px;">${r.cal?r.cal+' kcal · ':''} ${r.time?r.time+' min':''}</div></button>
            <span style="display:flex;margin-right:2px;">${ppl.slice(0,4).map((m,i)=>`<span style="margin-left:${i?-6:0}px">${avHTML(m.name,20)}</span>`).join('')}</span>
            <button data-rem="${key}:${idx}" aria-label="Remove" style="color:#C9776B;display:flex;padding:2px;">${ic('trash',15)}</button>
          </div>`;}).join(''):`<div class="muted" style="font-size:12.5px;padding:5px 0;">—</div>`}
      </div>`;}).join('')}</div>`).join('');
  grid.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openRecipe(b.dataset.open));
  grid.querySelectorAll('[data-rem]').forEach(b=>b.onclick=()=>{const[k,i]=b.dataset.rem.split(':');plan[k].splice(+i,1);lsSave();if(sb&&user)sbSync();renderPlanner();});
  grid.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>addDishModal(b.dataset.add));
  renderShopping();
}
function addDishModal(key){
  const[day,ml]=key.split('-');
  let mIds=members.map(m=>m.id);
  let q2='';
  const n=document.createElement('div');n.className='scrim';n.style.zIndex=70;
  n.innerHTML=`<div class="sheet" style="max-width:560px;"><div class="sheet-pad">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;"><h2 style="font-size:19px;">Add to ${day} · ${cap(ml)}</h2><button id="adClose" class="sheet-close" style="position:relative;right:auto;top:auto;">${ic('x',17)}</button></div>
    <div style="font-size:11.5px;font-weight:700;color:#9A8C75;margin-bottom:6px;">FOR WHOM</div>
    <div id="adM" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;"></div>
    <div class="s-wrap" style="margin-bottom:12px;"><span class="ico">${ic('search',16)}</span><input id="adQ" class="inp pl" placeholder="Search recipes…" autocomplete="off"/></div>
    <div id="adList" style="display:grid;gap:8px;"></div>
  </div></div>`;
  document.body.appendChild(n);
  n.onclick=e=>{if(e.target===n)n.remove();};
  n.querySelector('#adClose').onclick=()=>n.remove();
  const drawM=()=>{
    n.querySelector('#adM').innerHTML=members.map(m=>{const on=mIds.includes(m.id);return `<button class="eater-btn" data-eat3="${m.id}" style="border-color:${on?'#1B6E47':'#ECE3D4'};background:${on?'#E5F0EA':'#fff'};color:${on?'#0F5A39':'#7C6F5C'};padding:4px 10px 4px 5px;">${avHTML(m.name,18)} ${esc(m.name)}</button>`;}).join('');
    n.querySelectorAll('[data-eat3]').forEach(b=>b.onclick=()=>{const id=b.dataset.eat3;mIds=mIds.includes(id)?mIds.filter(x=>x!==id):[...mIds,id];drawM();});
  };
  drawM();
  const drawList=()=>{
    const matches=RECIPES.filter(r=>r.meals.includes(ml)&&(r.name.toLowerCase().includes(q2)||r.cuisine.toLowerCase().includes(q2))).map(r=>({r,m:matchOf(r,pantry)})).sort((a,b)=>b.m.pct-a.m.pct||b.r.rating-a.r.rating);
    n.querySelector('#adList').innerHTML=matches.slice(0,12).map(({r,m})=>`<button data-pick="${r.id}" style="display:flex;align-items:center;gap:11px;padding:10px;border-radius:12px;border:1px solid #ECE3D4;background:#fff;text-align:left;width:100%;">
      <span style="font-size:24px;">${r.emoji}</span>
      <span style="flex:1;"><div style="font-size:14px;font-weight:600;">${esc(r.name)}</div><div class="muted" style="font-size:12px;">${esc(r.cuisine)} · ${r.time} min · ${r.cal} kcal</div></span>
      ${m.pct>=.999?`<span class="pill p-g">Have all</span>`:`<span class="pill p-s">${m.miss.length} to buy</span>`}
    </button>`).join('');
    n.querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>{
      const r=RECIPES.find(x=>x.id===b.dataset.pick);
      const k=key;plan[k]=plan[k]||[];plan[k].push({id:r.id,name:r.name,emoji:r.emoji,memberIds:[...mIds]});
      lsSave();if(sb&&user)sbSync();n.remove();renderPlanner();showToast('Added to '+day);
    });
  };
  drawList();
  n.querySelector('#adQ').addEventListener('input',e=>{q2=e.target.value.toLowerCase();drawList();});
}
function renderShopping(){
  const box=document.getElementById('shopBox');
  const all=Object.values(plan).flat();
  if(!all.length){box.innerHTML='<p class="muted" style="font-size:13px;">Plan some meals and your shopping list builds itself — pantry items are deducted automatically.</p>';return;}
  const agg={};
  all.forEach(en=>{
    const r=RECIPES.find(x=>x.id===en.id);if(!r)return;
    r.ings.forEach(ing=>{if(ing.q==null)return;const k=bW(ing.n)+'|'+ing.u;if(!agg[k])agg[k]={name:ing.n,unit:ing.u,need:0};agg[k].need+=ing.q;});
  });
  const buy=[],have=[];
  Object.values(agg).forEach(it=>{const row={...it,need:Math.round(it.need*10)/10};(pHas(pantry,it.name)?have:buy).push(row);});
  buy.sort((a,b)=>a.name.localeCompare(b.name));have.sort((a,b)=>a.name.localeCompare(b.name));
  box.innerHTML=`
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:10px;">${ic('basket',16)} <span style="font-weight:700;font-size:13.5px;">To buy (${buy.length})</span></div>
    ${buy.length?`<div style="margin-bottom:16px;">${buy.map((it,i)=>`<div class="shop-item" ${i?'':'style="border-top:none;"'}><span style="text-transform:capitalize;font-size:13.5px;font-weight:500;">${esc(it.name)}</span><span style="font-size:13px;font-weight:700;color:#B23120;">${fmtQ(it.need,it.unit)}</span></div>`).join('')}</div>`:'<p style="font-size:12.5px;color:#0F5A39;margin-bottom:16px;">Nothing — your pantry covers the plan.</p>'}
    ${have.length?`<div style="display:flex;align-items:center;gap:7px;margin-bottom:8px;">${ic('check',16)} <span style="font-weight:700;font-size:13.5px;">Already in pantry (${have.length})</span></div><div style="display:flex;flex-wrap:wrap;gap:6px;">${have.map(it=>`<span class="pill p-g" style="text-transform:capitalize;">${esc(it.name)}</span>`).join('')}</div>`:''}`;}

/* ════════ HOUSEHOLD ════════ */
function renderHousehold(){
  document.getElementById('addMemberBtn').innerHTML=ic('plus',16)+' Add member';
  document.getElementById('hhSub').textContent=`${members.length} ${members.length===1?'person':'people'} · sets default servings, calorie targets and diet filters.`;
  document.getElementById('memberGrid').innerHTML=members.map(m=>`<div class="card member-card">
    <div class="mc-top">${avHTML(m.name,38)}<div style="flex:1;"><div class="mc-name">${esc(m.name)}</div><div class="mc-sub">${m.age} yrs · ${m.weight} kg</div></div>
    <button data-edit="${m.id}" style="border:1px solid #ECE3D4;background:#fff;border-radius:10px;padding:7px;display:flex;color:#7C6F5C;">${ic('pencil',15)}</button></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">${ic('flame',15)}<span style="font-size:13px;font-weight:600;">${m.target} kcal/day</span></div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">${m.restrictions.length?m.restrictions.map(r=>`<span class="pill p-t">${r}</span>`).join(''):'<span class="muted" style="font-size:12px;">No restrictions</span>'}</div>
  </div>`).join('');
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>editMember(b.dataset.edit));
  document.getElementById('addMemberBtn').onclick=()=>editMember('new');
}
function editMember(id){
  const isNew=id==='new';
  const src=isNew?{id:'new',name:'',age:30,weight:60,target:2000,restrictions:[]}:{...members.find(m=>m.id===id),restrictions:[...members.find(m=>m.id===id).restrictions]};
  const f={...src};
  const n=document.createElement('div');n.className='scrim';n.style.zIndex=70;
  n.innerHTML=`<div class="sheet" style="max-width:480px;"><div class="sheet-pad">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;"><h2 style="font-size:20px;">${isNew?'Add member':'Edit member'}</h2><button id="emClose" class="sheet-close" style="position:relative;right:auto;top:auto;">${ic('x',17)}</button></div>
    <div style="margin-bottom:12px;"><div class="field-lbl">Name</div><input id="fName" class="inp" value="${esc(f.name)}" placeholder="e.g. Sadia"/></div>
    <div class="field-grid cols3" style="margin-bottom:12px;">
      <div><div class="field-lbl">Age</div><input id="fAge" class="inp" inputmode="numeric" value="${f.age}"/></div>
      <div><div class="field-lbl">Weight kg</div><input id="fWt" class="inp" inputmode="numeric" value="${f.weight}"/></div>
      <div><div class="field-lbl">kcal/day</div><input id="fCal" class="inp" inputmode="numeric" value="${f.target}"/></div>
    </div>
    <div style="margin-bottom:18px;"><div class="field-lbl">Dietary restrictions</div>
      <div id="fRes" style="display:flex;flex-wrap:wrap;gap:6px;"></div></div>
    <div style="display:flex;gap:10px;">
      ${isNew?'':`<button id="emDel" class="btn btn-r" style="padding:11px 14px;">${ic('trash',16)}</button>`}
      <button id="emSave" class="btn btn-g btn-b">Save member</button>
    </div>
  </div></div>`;
  document.body.appendChild(n);
  const drawRes=()=>{n.querySelector('#fRes').innerHTML=RESTS.map(r=>{const on=f.restrictions.includes(r);return `<button data-res="${r}" style="padding:6px 12px;border-radius:99px;border:1px solid ${on?'#D1493A':'#ECE3D4'};background:${on?'#FBE7E3':'#fff'};color:${on?'#B23120':'#7C6F5C'};font-weight:600;font-size:12.5px;">${r}</button>`;}).join('');
    n.querySelectorAll('[data-res]').forEach(b=>b.onclick=()=>{const r=b.dataset.res;f.restrictions=f.restrictions.includes(r)?f.restrictions.filter(x=>x!==r):[...f.restrictions,r];drawRes();});};
  drawRes();
  n.onclick=e=>{if(e.target===n)n.remove();};
  n.querySelector('#emClose').onclick=()=>n.remove();
  if(!isNew)n.querySelector('#emDel').onclick=()=>{members=members.filter(x=>x.id!==id);lsSave();if(sb&&user)sbSync();n.remove();renderHousehold();};
  n.querySelector('#emSave').onclick=()=>{
    const name=n.querySelector('#fName').value.trim();if(!name){showToast('Name is required');return;}
    const obj={id:isNew?'m'+Date.now():id,name,age:+n.querySelector('#fAge').value||0,weight:+n.querySelector('#fWt').value||0,target:+n.querySelector('#fCal').value||0,restrictions:f.restrictions};
    if(isNew)members.push(obj);else members=members.map(x=>x.id===id?obj:x);
    lsSave();if(sb&&user)sbSync();n.remove();renderHousehold();
    eaters=[...new Set([...eaters,obj.id])];
  };
}

/* ════════ BOOT ════════ */
async function boot(){
  initDiscover();
  renderTabs();
  await initAuth();
  // wire pantry icon init
  document.getElementById('pantryAddBtn').innerHTML=ic('plus',18);
}
boot();
</script>
